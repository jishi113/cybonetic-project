<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App - Week 3</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>📝 My To-Do List</h1>

        <!-- Add Todo Form -->
        <form class="todo-form">
            <input type="text" class="todo-input" placeholder="Add a new task..." required />
            <button type="submit" class="btn-add">Add</button>
        </form>

        <!-- Filter Buttons -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="btn-clear-completed">Clear Completed</button>
        </div>

        <!-- Todo List -->
        <ul class="todo-list"></ul>

        <!-- Empty State -->
        <p class="empty-state">No tasks yet! Add one above.</p>

        <!-- Footer -->
        <div class="todo-footer">
            <span class="count">0 items left</span>
            <div class="sort-options">
                <label>Sort by:</label>
                <select id="sortBy">
                    <option value="date">Date</option>
                    <option value="alphabetical">Alphabetical</option>
                    <option value="completed">Completed Last</option>
                </select>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
